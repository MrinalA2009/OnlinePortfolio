# ─────────────────────────────────────────────────────────────
#  Mrinal Agarwal Portfolio — GitHub Pages Deployment
#  Triggers on every push to main, or manually from Actions tab.
#  Requires: Settings → Pages → Source = "GitHub Actions"
#  Live URL: https://mrinala2009.github.io/OnlinePortfolio/
# ─────────────────────────────────────────────────────────────

name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build static export
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          # The Next.js project lives in portfolio/, not the repo root
          cache-dependency-path: portfolio/package-lock.json

      - name: Install dependencies
        working-directory: ./portfolio
        run: npm ci

      - name: Build Next.js static export
        working-directory: ./portfolio
        run: npm run build
        # GitHub Actions automatically sets GITHUB_ACTIONS=true and
        # GITHUB_REPOSITORY="MrinalA2009/OnlinePortfolio".
        # next.config.ts reads these to apply basePath=/OnlinePortfolio.

      - name: Add .nojekyll (prevent Jekyll from ignoring _next/ assets)
        run: touch ./portfolio/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The static export is in portfolio/out, not ./out
          path: ./portfolio/out

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
