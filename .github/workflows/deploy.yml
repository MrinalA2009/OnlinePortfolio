# ─────────────────────────────────────────────────────────────
#  Mrinal Agarwal Portfolio — GitHub Pages Deployment
#  Triggers on every push to main, or manually from Actions tab.
#  Deploys to the gh-pages branch → GitHub Pages serves it.
#  Live URL: https://mrinala2009.github.io/OnlinePortfolio/
# ─────────────────────────────────────────────────────────────

name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write   # required to push to gh-pages branch

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1 — Check out source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2 — Set up Node 20 with npm cache
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: portfolio/package-lock.json

      # 3 — Install dependencies (uses lockfile for reproducible builds)
      - name: Install dependencies
        working-directory: ./portfolio
        run: npm ci

      # 4 — Build static export
      #     GITHUB_ACTIONS=true and GITHUB_REPOSITORY are set automatically.
      #     next.config.ts reads them to apply basePath=/OnlinePortfolio.
      - name: Build Next.js static export
        working-directory: ./portfolio
        run: npm run build

      # 5 — Prevent GitHub from processing _next/ with Jekyll
      - name: Add .nojekyll
        run: touch ./portfolio/out/.nojekyll

      # 6 — Push ./portfolio/out to gh-pages branch
      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./portfolio/out
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy portfolio — ${{ github.sha }}"
