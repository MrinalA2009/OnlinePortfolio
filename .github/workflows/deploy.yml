# ─────────────────────────────────────────────────────────────
#  Mrinal Agarwal Portfolio — GitHub Pages Deployment
#  Triggers automatically on every push to `main`.
#  Deployed URL: https://mrinala2009.github.io/OnlinePortfolio/
# ─────────────────────────────────────────────────────────────

name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:          # Allow manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment; queue rather than cancel in-progress.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── JOB 1: Build ──────────────────────────────────────────
  build:
    name: Build Static Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: portfolio/package-lock.json

      - name: Install dependencies
        working-directory: ./portfolio
        run: npm ci

      - name: Build Next.js static export
        working-directory: ./portfolio
        run: npm run build
        # GITHUB_ACTIONS and GITHUB_REPOSITORY are set automatically
        # by the runner — next.config.ts reads them to set basePath.

      - name: Add .nojekyll (prevent GitHub Jekyll processing)
        run: touch ./portfolio/out/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static export artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./portfolio/out

  # ── JOB 2: Deploy ─────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
